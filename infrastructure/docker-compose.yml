version: '3.8'

services:
  backend-api:
    build:
      context: ../backend-api
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - ../.env
    depends_on:
      - db

  frontend-admin:
    build:
      context: ../frontend-admin
      dockerfile: ../infrastructure/docker/frontend-admin.Dockerfile
    ports:
      - "${FRONTEND_ADMIN_PORT:-3000}:3000"
    env_file:
      - ../.env

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qdrs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
